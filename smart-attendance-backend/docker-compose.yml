version: "3.8"

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  # Note: The FastAPI backend and Celery workers are intended to be run locally
  # via Python virtual environment (e.g. `uvicorn app.main:app` and `celery -A app.celery_app worker`)
  # during development, so we only containerize the infrastructure dependencies here.

volumes:
  postgres_data:
  redis_data:
