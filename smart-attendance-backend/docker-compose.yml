version: "3.8"

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  celery-worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    # Scale celery workers using docker-compose up --scale celery-worker=4
    command: celery -A app.celery_app worker --concurrency=4 --loglevel=info

  celery-beat:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
